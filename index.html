<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Card Match</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel-bg: rgba(13,20,33,0.95);
      --board-bg: rgba(15,24,41,0.95);
      --score-bg: rgba(255,255,255,0.05);
      --score-border: rgba(255,255,255,0.08);
      --control-bg: rgba(255,255,255,0.07);
      --control-focus: rgba(72, 158, 248, 0.16);
      --victory-bg: rgba(7,15,29,0.98);
      --modal-bg: rgba(6,12,24,0.82);
      --card-back-start: rgba(124,231,185,0.25);
      --card-back-end: #12203a;
      --card-bg: #151f33;
      --card-face: #f7f8fb;
      --accent: #7ce7b9;
      --accent-strong: #4ae28e;
      --text: #e3ecff;
      --muted: #9cb2d0;
      --shadow: 0 20px 45px rgba(0,0,0,0.25);
      --highlight: #ffd56b;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(124,231,185,0.16), transparent 26%),
                  linear-gradient(180deg, #09101e 0%, #07111f 55%, #08131f 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body.light-mode {
      --bg: #eff6ff;
      --panel-bg: rgba(255,255,255,0.88);
      --board-bg: rgba(255,255,255,0.96);
      --score-bg: rgba(255,255,255,0.82);
      --score-border: rgba(148,163,184,0.18);
      --control-bg: rgba(255,255,255,0.92);
      --control-focus: rgba(59,130,246,0.32);
      --victory-bg: rgba(255,255,255,0.98);
      --modal-bg: rgba(226,232,240,0.92);
      --card-back-start: rgba(59,130,246,0.16);
      --card-back-end: #dbeafe;
      --text: #102a43;
      --muted: #475569;
      --shadow: 0 20px 45px rgba(15,42,75,0.12);
      background: radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 24%),
                  linear-gradient(180deg, #f8fafc 0%, #e2e8f0 55%, #f8fafc 100%);
    }

    * {
      box-sizing: border-box;
    }

    .app-shell {
      width: min(1180px, 100%);
      display: grid;
      gap: 24px;
    }

    .panel {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      padding: 22px;
      border-radius: 28px;
      background: var(--panel-bg);
      border: 1px solid var(--score-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      color: var(--text);
    }

    .panel h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2vw, 2.4rem);
      letter-spacing: -0.03em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .controls label,
    .controls button {
      font-size: 0.95rem;
    }

    .controls select,
    .controls button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--control-bg);
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      min-width: 130px;
    }

    .controls select option {
      background: var(--control-bg);
      color: var(--text);
    }

    .controls select:focus {
      box-shadow: inset 0 0 0 1px var(--control-focus);
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }

    .controls button {
      cursor: pointer;
      transition: transform 200ms ease, background 200ms ease;
    }

    .controls button:hover {
      transform: translateY(-1px);
      background: rgba(72, 158, 248, 0.16);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 14px;
      width: 100%;
    }

    .score-card {
      position: relative;
      border-radius: 18px;
      background: var(--score-bg);
      padding: 18px 16px;
      border: 1px solid var(--score-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      color: var(--text);
    }

    .score-card strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .score-card span {
      color: var(--muted);
      display: block;
      font-size: 0.95rem;
    }

    .score-pop {
      animation: scorePop 400ms ease forwards;
    }

    @keyframes scorePop {
      0% { transform: scale(1); color: var(--text); }
      50% { transform: scale(1.12); color: #7ce7b9; }
      100% { transform: scale(1); color: var(--text); }
    }

    .board-wrap {
      position: relative;
      padding: 14px;
      border-radius: 30px;
      background: var(--board-bg);
      border: 1px solid var(--score-border);
      box-shadow: var(--shadow);
      max-width: min(1250px, calc(100vw - 48px));
      margin: 0 auto;
      overflow: hidden;
    }

    .board {
      display: grid;
      gap: clamp(12px, 1.6vw, 18px);
      justify-content: center;
      width: 100%;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: clamp(110px, 14vw, 160px);
      aspect-ratio: 4 / 5;
      transform-style: preserve-3d;
      transition: transform 450ms ease;
      cursor: pointer;
      perspective: 900px;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.disabled {
      cursor: default;
      pointer-events: none;
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      display: grid;
      place-items: center;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 22px 40px rgba(0,0,0,0.22);
      color: var(--text);
    }

    .card-front {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      transform: rotateY(180deg);
      font-size: clamp(2rem, 4vw, 3.2rem);
    }

    .card-back {
      background: radial-gradient(circle at 30% 20%, var(--card-back-start), transparent 32%),
                  linear-gradient(180deg, #1b2744 0%, var(--card-back-end) 100%);
      border: 1px solid var(--score-border);
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 16px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 22%),
                  repeating-linear-gradient(45deg, rgba(255,255,255,0.06), rgba(255,255,255,0.06) 2px, transparent 2px, transparent 8px);
      opacity: 0.75;
    }

    .match-glow {
      animation: glowBurst 600ms ease-out forwards;
    }

    .match-popup {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%) scale(0.96);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(124,231,185,0.95);
      color: #08121e;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
      white-space: nowrap;
    }

    body.light-mode .match-popup {
      background: rgba(59,130,246,0.95);
      color: #ffffff;
    }

    @keyframes glowBurst {
      0% { box-shadow: 0 0 0 0 rgba(125, 214, 113, 0.5); }
      40% { box-shadow: 0 0 0 18px rgba(125, 214, 113, 0.18); }
      100% { box-shadow: 0 0 0 32px rgba(125, 214, 113, 0); }
    }

    .match-shake {
      animation: bounceWiggle 500ms ease forwards;
    }

    @keyframes bounceWiggle {
      0% { transform: rotateY(180deg) scale(1); }
      25% { transform: rotateY(180deg) scale(1.15) rotateZ(-1deg); }
      60% { transform: rotateY(180deg) scale(1.05) rotateZ(1deg); }
      100% { transform: rotateY(180deg) scale(1) rotateZ(0); }
    }

    .match-flash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(92, 205, 143, 0.35);
      opacity: 0;
      animation: flashOverlay 420ms ease forwards;
      pointer-events: none;
      border-radius: 22px;
    }

    @keyframes flashOverlay {
      0% { opacity: 0.42; transform: scale(1.02); }
      100% { opacity: 0; transform: scale(1); }
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4);
    }

    .victory-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--modal-bg);
      z-index: 99;
      padding: 24px;
    }

    .victory-modal.active {
      display: flex;
    }

    .victory-card {
      width: min(520px, 100%);
      border-radius: 28px;
      padding: 28px;
      background: var(--victory-bg);
      border: 1px solid var(--score-border);
      box-shadow: 0 40px 80px rgba(0,0,0,0.35);
      text-align: center;
      color: var(--text);
    }

    .victory-card h2 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 2.5vw, 2.8rem);
    }

    .victory-card .stats {
      display: grid;
      gap: 12px;
      margin: 20px 0 24px;
    }

    .victory-card .stats div {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      font-size: 0.98rem;
    }

    body.light-mode .victory-card .stats div {
      background: rgba(15,23,42,0.06);
    }

    .victory-card button {
      background: linear-gradient(135deg, #7ce7b9, #4fe5d8);
      color: #08121e;
      border: none;
      border-radius: 16px;
      padding: 14px 22px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 200ms ease;
    }

    .victory-card button:hover {
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .scoreboard { grid-template-columns: repeat(2, minmax(110px, 1fr)); }
      .controls { width: 100%; justify-content: space-between; }
      .board { gap: 12px; }
      .card { max-width: clamp(90px, 18vw, 140px); }
      .panel { gap: 12px; }
    }

    @media (max-width: 760px) {
      .scoreboard { grid-template-columns: repeat(2, minmax(100px, 1fr)); }
      .controls { width: 100%; justify-content: space-between; }
      .board { gap: 10px; }
      .card { max-width: clamp(80px, 18vw, 130px); }
      .panel { gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="panel">
      <div>
        <h1>Memory Match</h1>
        <p style="color: var(--muted); margin: 8px 0 0; max-width: 560px;">Choose difficulty and theme, then flip cards to find every matching pair.</p>
      </div>
      <div class="controls">
        <label>
          Difficulty
          <select id="difficulty-select" aria-label="Select difficulty">
            <option value="easy">Easy 4×3</option>
            <option value="medium" selected>Medium 4×4</option>
            <option value="hard">Hard 6×5</option>
          </select>
        </label>
        <label>
          Theme
          <select id="theme-select" aria-label="Select theme">
            <option value="animals" selected>Animals</option>
            <option value="food">Food</option>
            <option value="flags">Flags</option>
          </select>
        </label>
        <button id="theme-toggle" class="mode-toggle" type="button" aria-label="Toggle light and dark mode">Light Mode</button>
        <button id="new-game-btn" type="button">New Game</button>
      </div>
    </section>

    <section class="panel scoreboard" aria-live="polite">
      <div class="score-card">
        <strong id="moves-count">0</strong>
        <span>Moves</span>
      </div>
      <div class="score-card">
        <strong id="matched-count">0</strong>
        <span>Matched</span>
      </div>
      <div class="score-card">
        <strong id="timer-count">00:00</strong>
        <span>Time</span>
      </div>
      <div class="score-card">
        <strong id="best-score">—</strong>
        <span>Best Score</span>
      </div>
    </section>

    <section class="board-wrap">
      <div id="board" class="board"></div>
    </section>
  </div>

  <div id="victory-modal" class="victory-modal" role="dialog" aria-modal="true" aria-labelledby="victory-title">
    <div class="victory-card">
      <h2 id="victory-title">You Win!</h2>
      <p style="color: var(--muted);">Perfect memory and timing. Here are your final stats:</p>
      <div class="stats">
        <div><span>Moves</span><strong id="victory-moves">0</strong></div>
        <div><span>Matched Pairs</span><strong id="victory-pairs">0</strong></div>
        <div><span>Time</span><strong id="victory-time">00:00</strong></div>
      </div>
      <button id="replay-btn" type="button">Play Again</button>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const newGameBtn = document.getElementById('new-game-btn');
    const difficultySelect = document.getElementById('difficulty-select');
    const themeSelect = document.getElementById('theme-select');
    const movesCount = document.getElementById('moves-count');
    const matchedCount = document.getElementById('matched-count');
    const timerCount = document.getElementById('timer-count');
    const bestScoreLabel = document.getElementById('best-score');
    const victoryModal = document.getElementById('victory-modal');
    const victoryMoves = document.getElementById('victory-moves');
    const victoryPairs = document.getElementById('victory-pairs');
    const victoryTime = document.getElementById('victory-time');
    const replayBtn = document.getElementById('replay-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const bodyEl = document.body;

    const themeSets = {
      animals: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
      food: ['🍎','🍉','🍇','🍒','🍌','🥑','🍕','🍔','🍣','🍦','🍩','🍪','🥨','🍰','🌮'],
      flags: ['🇺🇸','🇬🇧','🇨🇦','🇦🇺','🇯🇵','🇰🇷','🇫🇷','🇩🇪','🇮🇳','🇧🇷','🇲🇽','🇮🇹','🇪🇸','🇿🇦','🇨🇳']
    };

    const difficulties = {
      easy: { rows: 3, cols: 4 },
      medium: { rows: 4, cols: 4 },
      hard: { rows: 5, cols: 6 }
    };

    let gameState = {
      moves: 0,
      matched: 0,
      timer: 0,
      intervalId: null,
      firstCard: null,
      secondCard: null,
      lockBoard: false,
      totalPairs: 8,
      elapsed: 0,
      started: false
    };

    function getBestScoreKey() {
      return `memory-best-${difficultySelect.value}-${themeSelect.value}`;
    }

    function loadBestScore() {
      const best = localStorage.getItem(getBestScoreKey());
      bestScoreLabel.textContent = best ? best : '—';
    }

    function saveBestScore(moves, time) {
      const key = getBestScoreKey();
      const existing = localStorage.getItem(key);
      const scoreString = `${moves} moves • ${formatTime(time)}`;
      if (!existing || compareScore(moves, time, existing) < 0) {
        localStorage.setItem(key, scoreString);
        bestScoreLabel.textContent = scoreString;
        animateBestScore();
      }
    }

    function compareScore(moves, time, stored) {
      const [storedMoves] = stored.split(' moves');
      const prevMoves = Number(storedMoves);
      if (moves !== prevMoves) return moves - prevMoves;
      const prevTime = stored.match(/• (.*)$/)?.[1] ?? '00:00';
      const [min, sec] = prevTime.split(':').map(Number);
      return time - (min * 60 + sec);
    }

    function animateBestScore() {
      bestScoreLabel.classList.add('score-pop');
      setTimeout(() => bestScoreLabel.classList.remove('score-pop'), 500);
    }

    function setMode(mode) {
      if (mode === 'light') {
        bodyEl.classList.add('light-mode');
        themeToggle.textContent = 'Dark Mode';
      } else {
        bodyEl.classList.remove('light-mode');
        themeToggle.textContent = 'Light Mode';
      }
      localStorage.setItem('memory-site-mode', mode);
    }

    function toggleMode() {
      const nextMode = bodyEl.classList.contains('light-mode') ? 'dark' : 'light';
      setMode(nextMode);
    }

    function loadMode() {
      const savedMode = localStorage.getItem('memory-site-mode') || 'dark';
      setMode(savedMode);
    }

    function formatTime(seconds) {
      const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
      const ss = String(seconds % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    }

    function startTimer() {
      if (gameState.intervalId) return;
      gameState.started = true;
      gameState.intervalId = setInterval(() => {
        gameState.timer += 1;
        timerCount.textContent = formatTime(gameState.timer);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(gameState.intervalId);
      gameState.intervalId = null;
    }

    function pickCards() {
      const theme = themeSets[themeSelect.value];
      const total = difficulties[difficultySelect.value].rows * difficulties[difficultySelect.value].cols;
      const pairCount = total / 2;
      gameState.totalPairs = pairCount;
      const selection = [...theme].sort(() => Math.random() - 0.5).slice(0, pairCount);
      const deck = [...selection, ...selection].sort(() => Math.random() - 0.5);
      return deck;
    }

    function getColumnMinWidth(cols) {
      const gap = window.innerWidth <= 760 ? 10 : 12;
      const available = Math.max(window.innerWidth - 56, 240);
      const ideal = Math.floor((available - gap * (cols - 1)) / cols);
      return Math.max(50, Math.min(120, ideal));
    }

    function renderBoard() {
      board.innerHTML = '';
      const { rows, cols } = difficulties[difficultySelect.value];
      board.style.gridTemplateColumns = `repeat(${cols}, minmax(${getColumnMinWidth(cols)}px, 1fr))`;
      const cards = pickCards();

      cards.forEach((symbol, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.setAttribute('aria-label', 'Memory card');
        card.innerHTML = `
          <div class="card-face card-front">${symbol}</div>
          <div class="card-face card-back"></div>
        `;
        card.addEventListener('click', handleCardFlip);
        board.appendChild(card);
      });
    }

    function updateGridColumns() {
      const { cols } = difficulties[difficultySelect.value];
      board.style.gridTemplateColumns = `repeat(${cols}, minmax(${getColumnMinWidth(cols)}px, 1fr))`;
    }

    window.addEventListener('resize', updateGridColumns);

    function handleCardFlip(event) {
      const card = event.currentTarget;
      if (gameState.lockBoard || card.classList.contains('flipped')) return;
      if (!gameState.started) startTimer();

      card.classList.add('flipped');
      if (!gameState.firstCard) {
        gameState.firstCard = card;
        return;
      }

      gameState.secondCard = card;
      gameState.lockBoard = true;
      gameState.moves += 1;
      movesCount.textContent = gameState.moves;

      const firstSymbol = gameState.firstCard.dataset.symbol;
      const secondSymbol = gameState.secondCard.dataset.symbol;

      if (firstSymbol === secondSymbol) {
        handleMatch();
      } else {
        setTimeout(handleMismatch, 900);
      }
    }

    function handleMatch() {
      gameState.matched += 1;
      matchedCount.textContent = gameState.matched;
      triggerMatchEffects(gameState.firstCard, gameState.secondCard);
      playMatchTone();
      animateMatchCounter();
      gameState.firstCard.removeEventListener('click', handleCardFlip);
      gameState.secondCard.removeEventListener('click', handleCardFlip);
      resetTurn();

      if (gameState.matched === gameState.totalPairs) {
        stopTimer();
        setTimeout(showVictory, 700);
        saveBestScore(gameState.moves, gameState.timer);
      }
    }

    function handleMismatch() {
      gameState.firstCard.classList.remove('flipped');
      gameState.secondCard.classList.remove('flipped');
      resetTurn();
    }

    function resetTurn() {
      gameState.firstCard = null;
      gameState.secondCard = null;
      gameState.lockBoard = false;
    }

    function animateMatchCounter() {
      matchedCount.classList.add('score-pop');
      setTimeout(() => matchedCount.classList.remove('score-pop'), 500);
    }

    const matchWords = ['Nice!', 'Perfect!', 'Great!', 'Awesome!', 'Matched!', 'Boom!', 'Sweet!', 'Yes!'];

    function triggerMatchEffects(cardA, cardB) {
      [cardA, cardB].forEach(card => {
        card.classList.add('match-glow', 'match-shake', 'match-flash');
        setTimeout(() => {
          card.classList.remove('match-glow', 'match-shake', 'match-flash');
        }, 700);
        spawnParticles(card);
      });
      spawnMatchPopup(cardA);
    }

    function spawnMatchPopup(card) {
      const message = matchWords[Math.floor(Math.random() * matchWords.length)];
      const popup = document.createElement('div');
      popup.className = 'match-popup';
      popup.textContent = message;

      const rect = card.getBoundingClientRect();
      const boardRect = board.getBoundingClientRect();
      popup.style.left = `${rect.left + rect.width / 2 - boardRect.left}px`;
      popup.style.top = `${rect.top + rect.height * 0.15 - boardRect.top}px`;
      board.appendChild(popup);

      const animation = popup.animate([
        { opacity: 0, transform: 'translate(-50%, -50%) translateY(0) scale(0.95)' },
        { opacity: 1, transform: 'translate(-50%, -50%) translateY(-18px) scale(1.05)' },
        { opacity: 1, transform: 'translate(-50%, -50%) translateY(-18px) scale(1.05)' },
        { opacity: 0, transform: 'translate(-50%, -50%) translateY(-36px) scale(1.1)' }
      ], {
        duration: 1600,
        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
        fill: 'forwards'
      });

      animation.onfinish = () => popup.remove();
    }

    function spawnParticles(card) {
      const rect = card.getBoundingClientRect();
      const parentRect = board.getBoundingClientRect();
      const originX = rect.left + rect.width / 2 - parentRect.left;
      const originY = rect.top + rect.height / 2 - parentRect.top;
      const particleCount = 16;
      const colors = ['#7ce7b9', '#ffbf69', '#9b5de5', '#69db7c', '#74c0fc'];

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${originX}px`;
        particle.style.top = `${originY}px`;
        particle.style.background = colors[i % colors.length];
        board.appendChild(particle);
        requestAnimationFrame(() => animateParticle(particle));
      }
    }

    function animateParticle(particle) {
      const angle = Math.random() * Math.PI * 2;
      const distance = 60 + Math.random() * 50;
      const targetX = Math.cos(angle) * distance;
      const targetY = Math.sin(angle) * distance;
      const scale = 0.6 + Math.random() * 0.8;
      const duration = 520 + Math.random() * 180;

      particle.animate([
        { transform: 'translate(-50%, -50%) scale(0.3)', opacity: 1 },
        { transform: `translate(${targetX - 50}%, ${targetY - 50}%) scale(${scale})`, opacity: 0 }
      ], {
        duration,
        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
        fill: 'forwards'
      });

      setTimeout(() => particle.remove(), duration);
    }

    function playMatchTone() {
      if (!window.AudioContext && !window.webkitAudioContext) return;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.value = 520;
      gain.gain.value = 0.08;
      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start();
      oscillator.stop(ctx.currentTime + 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    }

    function showVictory() {
      victoryMoves.textContent = gameState.moves;
      victoryPairs.textContent = gameState.matched;
      victoryTime.textContent = formatTime(gameState.timer);
      victoryModal.classList.add('active');
    }

    function resetGame() {
      stopTimer();
      gameState.moves = 0;
      gameState.matched = 0;
      gameState.timer = 0;
      gameState.firstCard = null;
      gameState.secondCard = null;
      gameState.lockBoard = false;
      gameState.started = false;
      movesCount.textContent = '0';
      matchedCount.textContent = '0';
      timerCount.textContent = '00:00';
      victoryModal.classList.remove('active');
      renderBoard();
      loadBestScore();
    }

    difficultySelect.addEventListener('change', resetGame);
    themeSelect.addEventListener('change', () => {
      resetGame();
    });
    themeToggle.addEventListener('click', toggleMode);
    newGameBtn.addEventListener('click', resetGame);
    replayBtn.addEventListener('click', resetGame);
    victoryModal.addEventListener('click', (event) => {
      if (event.target === victoryModal) resetGame();
    });

    loadMode();
    resetGame();
  </script>
</body>
</html>
